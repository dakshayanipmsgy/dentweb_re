<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Offline | Dakshayani Enterprises</title>
  <style>
    :root{color-scheme:light;--brand:#0f766e;--text:#0f172a;--muted:#475569;--bg:#f8fafc;--card:#fff;--border:#dbeafe}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:1.25rem;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#ecfeff,#f8fafc);color:var(--text)}
    main{width:min(100%,480px);background:var(--card);border:1px solid var(--border);border-radius:24px;padding:1.5rem;box-shadow:0 24px 60px rgba(15,23,42,.12);text-align:center}
    .badge{width:56px;height:56px;margin:0 auto 1rem;border-radius:18px;display:grid;place-items:center;background:#ccfbf1;color:var(--brand);font-size:1.7rem;font-weight:900}
    h1{margin:0 0 .6rem;font-size:clamp(1.45rem,7vw,2rem)}p{margin:0 0 1rem;color:var(--muted);line-height:1.55}.retry{display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:.8rem 1.1rem;border:0;border-radius:999px;background:var(--brand);color:#fff;font-weight:800;cursor:pointer}
  </style>
</head>
<body>
  <main aria-labelledby="offline-title">
    <div class="badge" aria-hidden="true">!</div>
    <h1 id="offline-title">Internet connection required</h1>
    <p>Internet connection is required to access the secure Dakshayani workspace. No private workspace data is available offline.</p>
    <button class="retry" type="button" onclick="window.location.reload()">Retry</button>
  </main>
</body>
</html>
